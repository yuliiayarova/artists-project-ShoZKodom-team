<section class="section about" id="about">
  <div class="container about-container">
    <div class="about-media">
      <picture>
        <source
          type="image/webp"
          media="(min-width:1440px)"
          srcset="
            /assets/images/about-us-img/about-team-desktop1x.webp  1x,
            /assets/images/about-us-img/about-team-desktop@2x.webp 2x
          "
        />

        <source
          type="image/webp"
          media="(min-width:768px)"
          srcset="
            /assets/images/about-us-img/about-team-tablet1x.webp  1x,
            /assets/images/about-us-img/about-team-tablet@2x.webp 2x
          "
        />

        <source
          type="image/webp"
          srcset="
            /assets/images/about-us-img/about-team-mobile1x.webp  1x,
            /assets/images/about-us-img/about-team-mobile@2x.webp 2x
          "
        />

        <source
          type="image/jpeg"
          media="(min-width:1440px)"
          srcset="
            /assets/images/about-us-img/about-team-desktop1x.jpg  1x,
            /assets/images/about-us-img/about-team-desktop@2x.jpg 2x
          "
        />

        <source
          type="image/jpeg"
          media="(min-width:768px)"
          srcset="
            /assets/images/about-us-img/about-team-tablet1x.jpg  1x,
            /assets/images/about-us-img/about-team-tablet@2x.jpg 2x
          "
        />

        <img
          class="about-img"
          src="/assets/images/about-us-img/about-team-mobile1x.jpg"
          srcset="/assets/images/about-us-img/about-team-mobile@2x.jpg 2x"
          alt="ArtistsHub team"
          loading="lazy"
        />
      </picture>
    </div>

    <div class="about-content">
      <svg class="about-icon" width="64" height="64">
        <use href="/assets/icons/sprite.svg#icon-logo-icon"></use>
      </svg>

      <h2 class="about-title">About ArtistsHub</h2>

      <p class="about-text">
        At ArtistsHub, our mission is to connect music lovers with the artists
        they adore. We strive to create a vibrant community where discovering
        new music is as enjoyable as listening to it.
      </p>
    </div>
  </div>
</section>
